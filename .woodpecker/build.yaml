when:
  - event: pull_request
  - event: push
    branch: main

steps:
  - name: restore-cache
    failure: ignore
    image: plugins/cache:1.10@sha256:3f2f4e07856b45e1e64546e6ed006655d55c7180144dba866a192da11c82384a
    settings:
      access_key:
        from_secret: garage_s3_access_key
      secret_key:
        from_secret: garage_s3_secret_key
      restore: true
      backend: s3
      endpoint: http://garage.garage.svc.cluster.local:3900
      bucket: buildkit-cache
      region: garage
      path_style: true
      archive_format: zstd
      cache_key: "netzbremse-{{ checksum \"go.sum\" }}-{{ checksum \"package-lock.json\" }}"
      mount:
        - .go-mod-cache
        - .npm-cache

  - name: go-test
    image: dhi.io/golang:1.26.4-debian13-dev@sha256:c02293a491c454b4fa27653b9d1ff8991b7355ce7b71a9ff6bc6b827e3eb9379
    environment:
      GOMODCACHE: /woodpecker/src/git.m0sh1.cc/m0sh1/netzbremse/.go-mod-cache
    commands:
      - mkdir -p .go-mod-cache
      - go test ./...

  - name: browser-script-check
    image: dhi.io/node:26.3.1-0-debian13-dev@sha256:b858c7e126fc5206b46ee98eefec4b58c7a658c99df2e57176e214fc1888b113
    commands:
      - node --check scripts/netzbremse-browser.mjs

  - name: release
    image: dhi.io/node:26.3.1-0-debian13-dev@sha256:b858c7e126fc5206b46ee98eefec4b58c7a658c99df2e57176e214fc1888b113
    when:
      - event: push
        branch: main
    environment:
      npm_config_cache: /woodpecker/src/git.m0sh1.cc/m0sh1/netzbremse/.npm-cache
      PUPPETEER_SKIP_DOWNLOAD: "true"
      FORGEJO_USERNAME:
        from_secret: forgejo_username
      FORGEJO_TOKEN:
        from_secret: forgejo_token
    commands:
      - |
        : "$${FORGEJO_USERNAME:?missing Woodpecker secret forgejo_username}"
        : "$${FORGEJO_TOKEN:?missing Woodpecker secret forgejo_token}"
      - |
        [ -n "$APT_PROXY_HOST" ] && echo "Acquire::http::Proxy \"http://$APT_PROXY_HOST:${APT_PROXY_PORT:-3142}\";" > /etc/apt/apt.conf.d/00proxy
      - apt-get update
      - apt-get install -y --no-install-recommends git ca-certificates
      - rm -rf /var/lib/apt/lists/*
      - rm -f .git/config.lock
      - git config user.name "woodpecker[bot]"
      - git config user.email "woodpecker@m0sh1.cc"
      - git config credential.https://git.m0sh1.cc.username "$FORGEJO_USERNAME"
      - git config credential.https://git.m0sh1.cc.helper '!f() { echo "password=$${FORGEJO_TOKEN}"; }; f'
      - git remote set-url origin "https://git.m0sh1.cc/m0sh1/netzbremse.git"
      - git fetch --tags origin
      - npm ci
      - node node_modules/.bin/semantic-release

  - name: rebuild-cache
    failure: ignore
    image: plugins/cache:1.10@sha256:3f2f4e07856b45e1e64546e6ed006655d55c7180144dba866a192da11c82384a
    settings:
      access_key:
        from_secret: garage_s3_access_key
      secret_key:
        from_secret: garage_s3_secret_key
      rebuild: true
      backend: s3
      endpoint: http://garage.garage.svc.cluster.local:3900
      bucket: buildkit-cache
      region: garage
      path_style: true
      archive_format: zstd
      cache_key: "netzbremse-{{ checksum \"go.sum\" }}-{{ checksum \"package-lock.json\" }}"
      mount:
        - .go-mod-cache
        - .npm-cache
