when:
  - event: tag
    ref: refs/tags/v*

variables:
  - &measurement_image "ghcr.io/yaelmoshi/netzbremse-measurement"
  - &dashboard_image "ghcr.io/yaelmoshi/netzbremse-dashboard"
  - &harbor_measurement_image "harbor.m0sh1.cc/apps/netzbremse-measurement"
  - &harbor_dashboard_image "harbor.m0sh1.cc/apps/netzbremse-dashboard"

steps:
  # ── Build (parallel) ───────────────────────────────────────────────
  - name: build-and-push-measurement
    image: woodpeckerci/plugin-docker-buildx@sha256:bfdb60c639233180bfaafdc2e0d4ca289669b3cccacdbdf5226be1058449acff
    settings:
      registry: ghcr.io
      repo:
        - *measurement_image
        - *harbor_measurement_image
      context: .
      dockerfile: Dockerfile.measurement
      platforms: linux/amd64
      logins:
        - registry: dhi.io
          username:
            from_secret: dhi_username
          password:
            from_secret: dhi_password
        - registry: harbor.m0sh1.cc
          username:
            from_secret: harbor_username
          password:
            from_secret: harbor_password
      tags:
        - "${CI_COMMIT_TAG##v}"
        - latest
      username:
        from_secret: github_username
      password:
        from_secret: github_token
      provenance: mode=max
      cache_from: 'type=registry\,ref=harbor.m0sh1.cc/cache/netzbremse-measurement:buildcache'
      cache_to: 'type=registry,ref=harbor.m0sh1.cc/cache/netzbremse-measurement:buildcache,mode=max,ignore-error=true'

  - name: build-and-push-dashboard
    image: woodpeckerci/plugin-docker-buildx@sha256:bfdb60c639233180bfaafdc2e0d4ca289669b3cccacdbdf5226be1058449acff
    settings:
      registry: ghcr.io
      repo:
        - *dashboard_image
        - *harbor_dashboard_image
      context: .
      dockerfile: Dockerfile.dashboard
      platforms: linux/amd64
      logins:
        - registry: dhi.io
          username:
            from_secret: dhi_username
          password:
            from_secret: dhi_password
        - registry: harbor.m0sh1.cc
          username:
            from_secret: harbor_username
          password:
            from_secret: harbor_password
      tags:
        - "${CI_COMMIT_TAG##v}"
        - latest
      username:
        from_secret: github_username
      password:
        from_secret: github_token
      provenance: mode=max
      cache_from: 'type=registry\,ref=harbor.m0sh1.cc/cache/netzbremse-dashboard:buildcache'
      cache_to: 'type=registry,ref=harbor.m0sh1.cc/cache/netzbremse-dashboard:buildcache,mode=max,ignore-error=true'

  # ── Trivy scan (parallel, each after its own build) ────────────────
  - name: trivy-scan-measurement
    image: dhi.io/trivy:0.71.0-alpine3.23-dev@sha256:081c285d76442d196ac8bd9bd415f838b0e7186944702884d236ad2322f23aab
    depends_on:
      - build-and-push-measurement
    environment:
      IMAGE_REF: "ghcr.io/yaelmoshi/netzbremse-measurement:${CI_COMMIT_TAG##v}"
      TRIVY_USERNAME:
        from_secret: github_username
      TRIVY_PASSWORD:
        from_secret: github_token
    commands:
      - trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed $${IMAGE_REF}
      - trivy image --exit-code 0 --severity HIGH --ignore-unfixed $${IMAGE_REF}
      - trivy image --format cosign-vuln --output measurement.vuln.json $${IMAGE_REF}

  - name: trivy-scan-dashboard
    image: dhi.io/trivy:0.71.0-alpine3.23-dev@sha256:081c285d76442d196ac8bd9bd415f838b0e7186944702884d236ad2322f23aab
    depends_on:
      - build-and-push-dashboard
    environment:
      IMAGE_REF: "ghcr.io/yaelmoshi/netzbremse-dashboard:${CI_COMMIT_TAG##v}"
      TRIVY_USERNAME:
        from_secret: github_username
      TRIVY_PASSWORD:
        from_secret: github_token
    commands:
      - trivy image --exit-code 1 --severity CRITICAL --ignore-unfixed $${IMAGE_REF}
      - trivy image --exit-code 0 --severity HIGH --ignore-unfixed $${IMAGE_REF}
      - trivy image --format cosign-vuln --output dashboard.vuln.json $${IMAGE_REF}

  # ── SBOM generation (parallel, each after its own scan) ────────────
  - name: sbom-generate-measurement
    image: dhi.io/syft:1.45.1-alpine3.23-dev@sha256:d680c1e089f70890cd06e48cc4422f3b122b9ebc57911333a5b8e795f1dd9683
    depends_on:
      - trivy-scan-measurement
    environment:
      IMAGE_REF: "ghcr.io/yaelmoshi/netzbremse-measurement:${CI_COMMIT_TAG##v}"
      SYFT_REGISTRY_AUTH_AUTHORITY: ghcr.io
      SYFT_REGISTRY_AUTH_USERNAME:
        from_secret: github_username
      SYFT_REGISTRY_AUTH_PASSWORD:
        from_secret: github_token
    commands:
      - syft registry:$${IMAGE_REF} -o spdx-json > measurement.sbom.spdx.json

  - name: sbom-generate-dashboard
    image: dhi.io/syft:1.45.1-alpine3.23-dev@sha256:d680c1e089f70890cd06e48cc4422f3b122b9ebc57911333a5b8e795f1dd9683
    depends_on:
      - trivy-scan-dashboard
    environment:
      IMAGE_REF: "ghcr.io/yaelmoshi/netzbremse-dashboard:${CI_COMMIT_TAG##v}"
      SYFT_REGISTRY_AUTH_AUTHORITY: ghcr.io
      SYFT_REGISTRY_AUTH_USERNAME:
        from_secret: github_username
      SYFT_REGISTRY_AUTH_PASSWORD:
        from_secret: github_token
    commands:
      - syft registry:$${IMAGE_REF} -o spdx-json > dashboard.sbom.spdx.json

  # ── Cosign sign GHCR (parallel, each after its own SBOM) ──────────
  - name: cosign-sign-measurement-ghcr
    image: dhi.io/cosign:3.0.6-alpine3.23-dev@sha256:1f114e202db2f37e8ef2a9b0dfc845a46a06dce5a1594d73271a80a298f6c647
    depends_on:
      - sbom-generate-measurement
    environment:
      IMAGE_REF: "ghcr.io/yaelmoshi/netzbremse-measurement:${CI_COMMIT_TAG##v}"
      COSIGN_EXPERIMENTAL: "1"
      COSIGN_KEY:
        from_secret: cosign_key
      COSIGN_PASSWORD:
        from_secret: cosign_password
      REGISTRY_USERNAME:
        from_secret: github_username
      REGISTRY_PASSWORD:
        from_secret: github_token
    commands:
      - echo "$COSIGN_KEY" > /tmp/cosign.key
      - cosign signing-config create --no-default-rekor --no-default-tsa --no-default-fulcio --no-default-oidc --out /tmp/cosign-signing-config.json
      - cosign login ghcr.io -u "$REGISTRY_USERNAME" -p "$REGISTRY_PASSWORD"
      - cosign sign --key /tmp/cosign.key --yes --signing-config /tmp/cosign-signing-config.json --registry-referrers-mode=oci-1-1 $${IMAGE_REF}
      - cosign attest --key /tmp/cosign.key --type spdxjson --predicate measurement.sbom.spdx.json --yes --signing-config /tmp/cosign-signing-config.json $${IMAGE_REF}
      - cosign attest --key /tmp/cosign.key --type vuln --predicate measurement.vuln.json --yes --signing-config /tmp/cosign-signing-config.json $${IMAGE_REF}
      - rm -f /tmp/cosign.key /tmp/cosign-signing-config.json

  - name: cosign-sign-dashboard-ghcr
    image: dhi.io/cosign:3.0.6-alpine3.23-dev@sha256:1f114e202db2f37e8ef2a9b0dfc845a46a06dce5a1594d73271a80a298f6c647
    depends_on:
      - sbom-generate-dashboard
    environment:
      IMAGE_REF: "ghcr.io/yaelmoshi/netzbremse-dashboard:${CI_COMMIT_TAG##v}"
      COSIGN_EXPERIMENTAL: "1"
      COSIGN_KEY:
        from_secret: cosign_key
      COSIGN_PASSWORD:
        from_secret: cosign_password
      REGISTRY_USERNAME:
        from_secret: github_username
      REGISTRY_PASSWORD:
        from_secret: github_token
    commands:
      - echo "$COSIGN_KEY" > /tmp/cosign.key
      - cosign signing-config create --no-default-rekor --no-default-tsa --no-default-fulcio --no-default-oidc --out /tmp/cosign-signing-config.json
      - cosign login ghcr.io -u "$REGISTRY_USERNAME" -p "$REGISTRY_PASSWORD"
      - cosign sign --key /tmp/cosign.key --yes --signing-config /tmp/cosign-signing-config.json --registry-referrers-mode=oci-1-1 $${IMAGE_REF}
      - cosign attest --key /tmp/cosign.key --type spdxjson --predicate dashboard.sbom.spdx.json --yes --signing-config /tmp/cosign-signing-config.json $${IMAGE_REF}
      - cosign attest --key /tmp/cosign.key --type vuln --predicate dashboard.vuln.json --yes --signing-config /tmp/cosign-signing-config.json $${IMAGE_REF}
      - rm -f /tmp/cosign.key /tmp/cosign-signing-config.json

  # ── Mirror to Harbor (parallel, each after its own GHCR sign) ──────
  - name: mirror-measurement-to-harbor
    image: dhi.io/crane:0.21.6-debian13-dev@sha256:0731664b3bc6836906cedffb127972c2e37a37f6e330143e093c82ea274b24fe
    depends_on:
      - cosign-sign-measurement-ghcr
    environment:
      SRC_IMAGE: "ghcr.io/yaelmoshi/netzbremse-measurement:${CI_COMMIT_TAG##v}"
      DST_IMAGE: "harbor.m0sh1.cc/apps/netzbremse-measurement:${CI_COMMIT_TAG##v}"
      GHCR_USERNAME:
        from_secret: github_username
      GHCR_PASSWORD:
        from_secret: github_token
      HARBOR_USERNAME:
        from_secret: harbor_username
      HARBOR_PASSWORD:
        from_secret: harbor_password
    commands:
      - crane auth login ghcr.io -u "$GHCR_USERNAME" -p "$GHCR_PASSWORD"
      - crane auth login harbor.m0sh1.cc -u "$HARBOR_USERNAME" -p "$HARBOR_PASSWORD"
      - crane cp "$SRC_IMAGE" "$DST_IMAGE"
      - crane cp "$SRC_IMAGE" "harbor.m0sh1.cc/apps/netzbremse-measurement:latest"

  - name: mirror-dashboard-to-harbor
    image: dhi.io/crane:0.21.6-debian13-dev@sha256:0731664b3bc6836906cedffb127972c2e37a37f6e330143e093c82ea274b24fe
    depends_on:
      - cosign-sign-dashboard-ghcr
    environment:
      SRC_IMAGE: "ghcr.io/yaelmoshi/netzbremse-dashboard:${CI_COMMIT_TAG##v}"
      DST_IMAGE: "harbor.m0sh1.cc/apps/netzbremse-dashboard:${CI_COMMIT_TAG##v}"
      GHCR_USERNAME:
        from_secret: github_username
      GHCR_PASSWORD:
        from_secret: github_token
      HARBOR_USERNAME:
        from_secret: harbor_username
      HARBOR_PASSWORD:
        from_secret: harbor_password
    commands:
      - crane auth login ghcr.io -u "$GHCR_USERNAME" -p "$GHCR_PASSWORD"
      - crane auth login harbor.m0sh1.cc -u "$HARBOR_USERNAME" -p "$HARBOR_PASSWORD"
      - crane cp "$SRC_IMAGE" "$DST_IMAGE"
      - crane cp "$SRC_IMAGE" "harbor.m0sh1.cc/apps/netzbremse-dashboard:latest"

  # ── Cosign sign Harbor (parallel, each after its own mirror) ───────
  - name: cosign-sign-measurement-harbor
    image: dhi.io/cosign:3.0.6-alpine3.23-dev@sha256:1f114e202db2f37e8ef2a9b0dfc845a46a06dce5a1594d73271a80a298f6c647
    depends_on:
      - mirror-measurement-to-harbor
    environment:
      IMAGE_REF: "harbor.m0sh1.cc/apps/netzbremse-measurement:${CI_COMMIT_TAG##v}"
      COSIGN_EXPERIMENTAL: "1"
      COSIGN_KEY:
        from_secret: cosign_key
      COSIGN_PASSWORD:
        from_secret: cosign_password
      REGISTRY_USERNAME:
        from_secret: harbor_username
      REGISTRY_PASSWORD:
        from_secret: harbor_password
    commands:
      - echo "$COSIGN_KEY" > /tmp/cosign.key
      - cosign signing-config create --no-default-rekor --no-default-tsa --no-default-fulcio --no-default-oidc --out /tmp/cosign-signing-config.json
      - cosign login harbor.m0sh1.cc -u "$REGISTRY_USERNAME" -p "$REGISTRY_PASSWORD"
      - cosign sign --key /tmp/cosign.key --yes --signing-config /tmp/cosign-signing-config.json --registry-referrers-mode=oci-1-1 $${IMAGE_REF}
      - cosign attest --key /tmp/cosign.key --type spdxjson --predicate measurement.sbom.spdx.json --yes --signing-config /tmp/cosign-signing-config.json $${IMAGE_REF}
      - cosign attest --key /tmp/cosign.key --type vuln --predicate measurement.vuln.json --yes --signing-config /tmp/cosign-signing-config.json $${IMAGE_REF}
      - rm -f /tmp/cosign.key /tmp/cosign-signing-config.json measurement.sbom.spdx.json measurement.vuln.json

  - name: cosign-sign-dashboard-harbor
    image: dhi.io/cosign:3.0.6-alpine3.23-dev@sha256:1f114e202db2f37e8ef2a9b0dfc845a46a06dce5a1594d73271a80a298f6c647
    depends_on:
      - mirror-dashboard-to-harbor
    environment:
      IMAGE_REF: "harbor.m0sh1.cc/apps/netzbremse-dashboard:${CI_COMMIT_TAG##v}"
      COSIGN_EXPERIMENTAL: "1"
      COSIGN_KEY:
        from_secret: cosign_key
      COSIGN_PASSWORD:
        from_secret: cosign_password
      REGISTRY_USERNAME:
        from_secret: harbor_username
      REGISTRY_PASSWORD:
        from_secret: harbor_password
    commands:
      - echo "$COSIGN_KEY" > /tmp/cosign.key
      - cosign signing-config create --no-default-rekor --no-default-tsa --no-default-fulcio --no-default-oidc --out /tmp/cosign-signing-config.json
      - cosign login harbor.m0sh1.cc -u "$REGISTRY_USERNAME" -p "$REGISTRY_PASSWORD"
      - cosign sign --key /tmp/cosign.key --yes --signing-config /tmp/cosign-signing-config.json --registry-referrers-mode=oci-1-1 $${IMAGE_REF}
      - cosign attest --key /tmp/cosign.key --type spdxjson --predicate dashboard.sbom.spdx.json --yes --signing-config /tmp/cosign-signing-config.json $${IMAGE_REF}
      - cosign attest --key /tmp/cosign.key --type vuln --predicate dashboard.vuln.json --yes --signing-config /tmp/cosign-signing-config.json $${IMAGE_REF}
      - rm -f /tmp/cosign.key /tmp/cosign-signing-config.json dashboard.sbom.spdx.json dashboard.vuln.json

  # ── Notation sign Harbor (parallel, each after its own cosign) ─────
  - name: notation-sign-measurement-harbor
    image: dhi.io/notation:1.3.2-alpine3.23-dev@sha256:0f4fcc63857713e7237f19e1cc68d1cb58f6ec8cebfd26a8cc0f0eea674d2be5
    depends_on:
      - cosign-sign-measurement-harbor
    environment:
      IMAGE_REF: "harbor.m0sh1.cc/apps/netzbremse-measurement:${CI_COMMIT_TAG##v}"
      NOTATION_KEY:
        from_secret: notation_key
      NOTATION_CERT:
        from_secret: notation_cert
      REGISTRY_USERNAME:
        from_secret: harbor_username
      REGISTRY_PASSWORD:
        from_secret: harbor_password
    commands:
      - mkdir -p /tmp/notation $HOME/.config/notation $HOME/.docker
      - echo "$NOTATION_KEY" > /tmp/notation/harbor.key
      - echo "$NOTATION_CERT" > /tmp/notation/harbor.crt
      - |
        cat > $HOME/.config/notation/signingkeys.json <<EOF
        {"default":"harbor","keys":[{"name":"harbor","keyPath":"/tmp/notation/harbor.key","certPath":"/tmp/notation/harbor.crt"}]}
        EOF
      - printf '{"auths":{"harbor.m0sh1.cc":{"auth":"%s"}}}' "$(printf '%s:%s' "$REGISTRY_USERNAME" "$REGISTRY_PASSWORD" | base64 | tr -d '\n')" > $HOME/.docker/config.json
      - notation sign --force-referrers-tag=false --key harbor $${IMAGE_REF}
      - rm -rf /tmp/notation $HOME/.docker/config.json

  - name: notation-sign-dashboard-harbor
    image: dhi.io/notation:1.3.2-alpine3.23-dev@sha256:0f4fcc63857713e7237f19e1cc68d1cb58f6ec8cebfd26a8cc0f0eea674d2be5
    depends_on:
      - cosign-sign-dashboard-harbor
    environment:
      IMAGE_REF: "harbor.m0sh1.cc/apps/netzbremse-dashboard:${CI_COMMIT_TAG##v}"
      NOTATION_KEY:
        from_secret: notation_key
      NOTATION_CERT:
        from_secret: notation_cert
      REGISTRY_USERNAME:
        from_secret: harbor_username
      REGISTRY_PASSWORD:
        from_secret: harbor_password
    commands:
      - mkdir -p /tmp/notation $HOME/.config/notation $HOME/.docker
      - echo "$NOTATION_KEY" > /tmp/notation/harbor.key
      - echo "$NOTATION_CERT" > /tmp/notation/harbor.crt
      - |
        cat > $HOME/.config/notation/signingkeys.json <<EOF
        {"default":"harbor","keys":[{"name":"harbor","keyPath":"/tmp/notation/harbor.key","certPath":"/tmp/notation/harbor.crt"}]}
        EOF
      - printf '{"auths":{"harbor.m0sh1.cc":{"auth":"%s"}}}' "$(printf '%s:%s' "$REGISTRY_USERNAME" "$REGISTRY_PASSWORD" | base64 | tr -d '\n')" > $HOME/.docker/config.json
      - notation sign --force-referrers-tag=false --key harbor $${IMAGE_REF}
      - rm -rf /tmp/notation $HOME/.docker/config.json
