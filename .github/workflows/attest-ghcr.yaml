name: attest-ghcr

on:
  registry_package:
    types:
      - published
  workflow_dispatch:
    inputs:
      image_name:
        description: GHCR image name without owner prefix
        required: true
        type: choice
        options:
          - netzbremse-measurement
          - netzbremse-dashboard
      image_tag:
        description: Image tag to attest
        required: true
        type: string

permissions:
  attestations: write
  contents: read
  id-token: write
  packages: write

concurrency:
  group: attest-${{ github.workflow }}-${{ github.event.registry_package.name || inputs.image_name }}-${{ github.event.registry_package.package_version.container_metadata.tag.name || inputs.image_tag }}
  cancel-in-progress: true

jobs:
  attest:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.registry_package.package_type == 'container' &&
        startsWith(github.event.registry_package.name, 'netzbremse-') &&
        github.event.registry_package.package_version.container_metadata.tag.name != '' &&
        github.event.registry_package.package_version.container_metadata.tag.name != 'latest'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target image
        id: target
        env:
          EVENT_NAME: ${{ github.event_name }}
          PACKAGE_NAME: ${{ github.event.registry_package.name }}
          PACKAGE_TAG: ${{ github.event.registry_package.package_version.container_metadata.tag.name }}
          INPUT_NAME: ${{ inputs.image_name }}
          INPUT_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            image_name="$INPUT_NAME"
            image_tag="$INPUT_TAG"
          else
            image_name="$PACKAGE_NAME"
            image_tag="$PACKAGE_TAG"
          fi
          echo "image_name=$image_name" >> "$GITHUB_OUTPUT"
          echo "image_ref=ghcr.io/yaelmoshi/$image_name:$image_tag" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: sm-moshi
          password: ${{ secrets.GHCR_ADMIN_TOKEN }}

      - name: Resolve manifest digest
        id: digest
        env:
          IMAGE_REF: ${{ steps.target.outputs.image_ref }}
        run: |
          set -euo pipefail
          digest="$(docker buildx imagetools inspect "$IMAGE_REF" --format '{{json .Manifest.Digest}}' | tr -d '\"')"
          echo "subject_name=${IMAGE_REF%%:*}" >> "$GITHUB_OUTPUT"
          echo "subject_digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ${{ steps.digest.outputs.subject_name }}
          subject-digest: ${{ steps.digest.outputs.subject_digest }}
          push-to-registry: true
          github-token: ${{ secrets.GHCR_ADMIN_TOKEN }}
